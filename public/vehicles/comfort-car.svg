<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <defs>
    <linearGradient id="comfortBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E4EE"/>
      <stop offset="100%" stop-color="#B4B8C2"/>
    </linearGradient>
    <radialGradient id="comfortShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.30)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- Drop shadow -->
  <ellipse cx="100" cy="91" rx="82" ry="7" fill="url(#comfortShadow)"/>
  <!-- Rear wheel -->
  <circle cx="150" cy="76" r="13" fill="#2a2a3a"/>
  <circle cx="150" cy="76" r="6" fill="#888898"/>
  <circle cx="150" cy="76" r="2.5" fill="#2a2a3a"/>
  <!-- Front wheel -->
  <circle cx="53" cy="76" r="13" fill="#2a2a3a"/>
  <circle cx="53" cy="76" r="6" fill="#888898"/>
  <circle cx="53" cy="76" r="2.5" fill="#2a2a3a"/>
  <!-- Premium elongated body (slightly longer hood) -->
  <rect x="20" y="54" width="162" height="24" rx="9" fill="url(#comfortBody)"/>
  <!-- Chrome-like window trim accent -->
  <rect x="62" y="53" width="91" height="2" rx="1" fill="#A8B0C0"/>
  <!-- Cabin (sleeker, slightly longer) -->
  <path d="M 62,54 L 76,22 L 138,22 L 152,54 Z" fill="#1C1C2E"/>
  <!-- Roof highlight streak -->
  <path d="M 80,23 L 136,23 L 136,25 L 80,25 Z" fill="rgba(255,255,255,0.10)"/>
  <!-- Front window -->
  <path d="M 69,53 L 82,24 L 112,24 L 112,53 Z" fill="rgba(182,210,235,0.55)"/>
  <!-- Rear window -->
  <path d="M 115,53 L 115,24 L 136,24 L 149,53 Z" fill="rgba(182,210,235,0.50)"/>
  <!-- Window reflections -->
  <path d="M 72,49 L 80,30 L 84,30 L 76,49 Z" fill="rgba(255,255,255,0.15)"/>
  <!-- Door line -->
  <line x1="112" y1="54" x2="112" y2="78" stroke="rgba(0,0,0,0.13)" stroke-width="1.5"/>
  <!-- Headlight (elongated premium style) -->
  <rect x="22" y="60" width="8" height="4" rx="2" fill="rgba(255,248,200,0.90)"/>
  <rect x="23" y="61" width="4" height="2" rx="1" fill="rgba(255,255,220,1)"/>
  <!-- Taillight (sleek horizontal) -->
  <rect x="172" y="59" width="6" height="9" rx="2" fill="rgba(200,50,50,0.80)"/>
  <!-- Chrome door handle hints -->
  <rect x="93" y="66" width="10" height="2" rx="1" fill="rgba(200,210,220,0.6)"/>
  <rect x="124" y="66" width="10" height="2" rx="1" fill="rgba(200,210,220,0.6)"/>
</svg>
