<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8BECF"/>
      <stop offset="100%" stop-color="#7A94A8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>
  </defs>
  <!-- Drop shadow -->
  <ellipse cx="140" cy="109" rx="90" ry="8" fill="rgba(0,0,0,0.20)" filter="url(#shadow)"/>
  <!-- Rear wheel -->
  <circle cx="72" cy="96" r="14" fill="#1a1a1a"/>
  <circle cx="72" cy="96" r="5.5" fill="#888"/>
  <!-- Front wheel -->
  <circle cx="208" cy="96" r="14" fill="#1a1a1a"/>
  <circle cx="208" cy="96" r="5.5" fill="#888"/>
  <!-- Body: tall boxy minivan -->
  <path d="M38,95 Q38,80 50,80 L54,80 L54,35 Q54,28 62,28 L220,28 Q228,28 232,35 L238,55 L245,80 L252,80 Q260,80 260,95 Z" fill="url(#bodyGrad)"/>
  <!-- Roof: flat top -->
  <rect x="54" y="28" width="178" height="8" rx="4" fill="#111827"/>
  <!-- Side windows (3 small) -->
  <rect x="60" y="38" width="35" height="22" rx="3" fill="rgba(160,190,215,0.45)"/>
  <rect x="102" y="38" width="40" height="22" rx="3" fill="rgba(160,190,215,0.45)"/>
  <rect x="150" y="38" width="35" height="22" rx="3" fill="rgba(160,190,215,0.45)"/>
  <!-- Front window -->
  <path d="M192,37 L220,30 L230,37 L228,55 L192,58 Z" fill="rgba(160,190,215,0.45)"/>
  <!-- Sliding door line -->
  <line x1="148" y1="30" x2="148" y2="80" stroke="#8090A0" stroke-width="1.5"/>
  <line x1="132" y1="60" x2="146" y2="60" stroke="#8090A0" stroke-width="1.5"/>
  <!-- Rear step -->
  <rect x="46" y="88" width="14" height="5" rx="1" fill="#607080" opacity="0.7"/>
  <!-- Accessibility symbol in sliding door area -->
  <!-- Head -->
  <circle cx="125" cy="47" r="4" fill="rgba(255,255,255,0.6)"/>
  <!-- Body/wheelchair shape -->
  <path d="M122,53 Q120,60 124,64 Q128,68 133,66 Q136,63 134,58 L128,54 Z" fill="rgba(255,255,255,0.5)"/>
  <!-- Taillight -->
  <rect x="45" y="55" width="7" height="18" rx="2" fill="#CC3333" opacity="0.9"/>
  <!-- Headlight -->
  <rect x="234" y="58" width="7" height="12" rx="2" fill="#FFFFCC" opacity="0.9"/>
</svg>