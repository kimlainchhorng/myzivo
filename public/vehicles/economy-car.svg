<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" fill="none">
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body-gray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#adb5bd"/>
      <stop offset="60%" stop-color="#868e96"/>
      <stop offset="100%" stop-color="#6c757d"/>
    </linearGradient>
    <linearGradient id="body-side-gray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9aa0a6"/>
      <stop offset="100%" stop-color="#5f6368"/>
    </linearGradient>
    <linearGradient id="front-face-gray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9aa0a6"/>
      <stop offset="100%" stop-color="#6c757d"/>
    </linearGradient>
    <linearGradient id="roof-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3038"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
    <linearGradient id="glass-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d8eb5" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#1c4e6e" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="glass-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a9cc7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1c5478" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="wheel-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="80" cy="84" rx="62" ry="6" fill="url(#shadow)"/>

  <!-- === MAIN BODY (3/4 view) === -->
  <!-- Side panel (left face) -->
  <path d="M18 54 L18 72 Q18 75 21 75 L120 75 Q123 75 123 72 L123 54 Z" fill="url(#body-side-gray)"/>
  <!-- Top surface / hood -->
  <path d="M18 54 L38 44 L132 44 L123 54 Z" fill="url(#body-gray)"/>
  <!-- Front face -->
  <path d="M123 44 L132 44 L132 72 Q132 75 129 75 L123 75 L123 44 Z" fill="url(#front-face-gray)"/>

  <!-- === CABIN / ROOF === -->
  <!-- Roof structure -->
  <path d="M38 44 L50 28 L110 28 L120 44 Z" fill="url(#body-side-gray)"/>
  <!-- Roof top -->
  <path d="M50 28 L55 24 L118 24 L120 28 L110 28 Z" fill="url(#roof-grad)"/>
  <!-- Roof front slope -->
  <path d="M110 28 L118 24 L125 38 L120 44 Z" fill="#1a1d24"/>

  <!-- === WINDOWS === -->
  <!-- Side window (2 panes) -->
  <path d="M45 43 L53 30 L78 30 L78 43 Z" fill="url(#glass-side)"/>
  <path d="M82 43 L82 30 L108 30 L114 43 Z" fill="url(#glass-side)"/>
  <!-- Front windshield -->
  <path d="M114 43 L108 30 L116 26 L122 40 Z" fill="url(#glass-front)"/>
  <!-- Window divider -->
  <line x1="80" y1="30" x2="80" y2="43" stroke="#1a1d24" stroke-width="2"/>

  <!-- === BODY DETAILS === -->
  <!-- Door crease line -->
  <path d="M21 60 L120 60" stroke="#6c757d" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Door handle rear -->
  <rect x="62" y="56" width="14" height="3" rx="1.5" fill="#868e96" stroke="#555" stroke-width="0.5"/>
  <!-- Door handle front -->
  <rect x="96" y="56" width="14" height="3" rx="1.5" fill="#868e96" stroke="#555" stroke-width="0.5"/>
  <!-- Side mirror -->
  <path d="M119 47 L125 45 L126 49 L120 50 Z" fill="#6c757d"/>
  <!-- Front grille -->
  <rect x="125" y="60" width="6" height="8" rx="1" fill="#2c3038"/>
  <rect x="126" y="61" width="4" height="1.5" rx="0.5" fill="#555"/>
  <rect x="126" y="63.5" width="4" height="1.5" rx="0.5" fill="#555"/>
  <rect x="126" y="66" width="4" height="1.5" rx="0.5" fill="#555"/>
  <!-- Headlight -->
  <path d="M124 50 L131 50 L132 55 L124 56 Z" fill="#fff9c4" fill-opacity="0.9"/>
  <path d="M124 50 L131 50 L132 55 L124 56 Z" stroke="#e6c020" stroke-width="0.5" fill="none"/>
  <!-- DRL strip -->
  <rect x="124" y="49" width="7" height="1.5" rx="0.75" fill="#ffe066" fill-opacity="0.95"/>
  <!-- Taillight -->
  <rect x="18" y="52" width="3" height="10" rx="1" fill="#e03131" fill-opacity="0.9"/>

  <!-- === ROOF HIGHLIGHT === -->
  <path d="M56 25 Q85 21 115 25" stroke="white" stroke-width="1.5" stroke-opacity="0.25" fill="none" stroke-linecap="round"/>

  <!-- === WHEELS === -->
  <!-- Rear wheel -->
  <circle cx="44" cy="75" r="13" fill="#1a1a2e"/>
  <circle cx="44" cy="75" r="9" fill="#2d2d3d"/>
  <circle cx="44" cy="75" r="6" fill="url(#wheel-rim)"/>
  <circle cx="44" cy="75" r="2.5" fill="#555"/>
  <line x1="44" y1="69" x2="44" y2="81" stroke="#a0a0a0" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="38" y1="75" x2="50" y2="75" stroke="#a0a0a0" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="40" y1="70.8" x2="48" y2="79.2" stroke="#a0a0a0" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="48" y1="70.8" x2="40" y2="79.2" stroke="#a0a0a0" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Front wheel -->
  <circle cx="106" cy="75" r="13" fill="#1a1a2e"/>
  <circle cx="106" cy="75" r="9" fill="#2d2d3d"/>
  <circle cx="106" cy="75" r="6" fill="url(#wheel-rim)"/>
  <circle cx="106" cy="75" r="2.5" fill="#555"/>
  <line x1="106" y1="69" x2="106" y2="81" stroke="#a0a0a0" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="100" y1="75" x2="112" y2="75" stroke="#a0a0a0" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="102" y1="70.8" x2="110" y2="79.2" stroke="#a0a0a0" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="110" y1="70.8" x2="102" y2="79.2" stroke="#a0a0a0" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Wheel arch shadow -->
  <path d="M31 73 Q44 80 57 73" stroke="#000" stroke-width="1.5" stroke-opacity="0.2" fill="none"/>
  <path d="M93 73 Q106 80 119 73" stroke="#000" stroke-width="1.5" stroke-opacity="0.2" fill="none"/>
</svg>
