<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8DADF"/>
      <stop offset="100%" stop-color="#B0B3BB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- Drop shadow -->
  <ellipse cx="140" cy="108" rx="80" ry="7" fill="rgba(0,0,0,0.18)" filter="url(#shadow)"/>
  <!-- Rear wheel -->
  <circle cx="80" cy="96" r="13" fill="#1a1a1a"/>
  <circle cx="80" cy="96" r="5" fill="#888"/>
  <!-- Front wheel -->
  <circle cx="200" cy="96" r="13" fill="#1a1a1a"/>
  <circle cx="200" cy="96" r="5" fill="#888"/>
  <!-- Body silhouette: low sedan, flat bottom, curved top with wheel arches -->
  <path d="M45,95 Q45,83 55,83 L63,83 Q68,62 80,58 L110,42 Q130,32 155,32 Q175,32 195,38 L220,52 Q230,58 235,65 L240,83 L248,83 Q258,83 258,95 Z" fill="url(#bodyGrad)"/>
  <!-- Roof / cabin top -->
  <path d="M110,42 Q130,32 155,32 Q175,32 195,38 L215,52 Q205,44 185,40 Q160,36 135,38 Q115,40 110,42 Z" fill="#1E2030"/>
  <!-- Window 1 (rear) -->
  <path d="M115,45 L130,38 L150,37 L150,52 L115,55 Z" fill="rgba(180,210,230,0.45)"/>
  <line x1="116" y1="44" x2="130" y2="38" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <!-- Window 2 (front) -->
  <path d="M152,37 L178,38 L192,45 L190,54 L152,52 Z" fill="rgba(180,210,230,0.45)"/>
  <line x1="153" y1="37" x2="178" y2="38" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <!-- Door line -->
  <line x1="152" y1="52" x2="152" y2="83" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>
  <!-- Taillight -->
  <rect x="52" y="68" width="6" height="10" rx="2" fill="#CC3333" opacity="0.9"/>
  <!-- Headlight -->
  <rect x="235" y="65" width="7" height="8" rx="2" fill="#FFFFCC" opacity="0.9"/>
</svg>