  <rect x="122" y="61" width="7" height="8" rx="1" fill="#2c3038"/>
  <path d="M121 51 L129 51 L130 56 L121 57 Z" fill="#fff9c4" fill-opacity="0.88"/>
  <rect x="121" y="50" width="8" height="1.5" rx="0.75" fill="#ffe066" fill-opacity="0.95"/>
  <rect x="24" y="53" width="3" height="9" rx="1" fill="#e03131" fill-opacity="0.85"/>
  <path d="M57 27 Q82 23 112 27" stroke="white" stroke-width="1.5" stroke-opacity="0.25" fill="none" stroke-linecap="round"/>

  <!-- Wheels — slightly smaller for compact -->
  <circle cx="46" cy="76" r="12" fill="#1a1a2e"/>
  <circle cx="46" cy="76" r="8.5" fill="#2d2d3d"/>
  <circle cx="46" cy="76" r="5.5" fill="url(#wheel-rim)"/>
  <circle cx="46" cy="76" r="2.2" fill="#555"/>
