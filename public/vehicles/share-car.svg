<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <defs>
    <linearGradient id="shareBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F2FF"/>
      <stop offset="100%" stop-color="#C8CAD6"/>
    </linearGradient>
    <radialGradient id="shareShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.28)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- Drop shadow -->
  <ellipse cx="100" cy="91" rx="76" ry="7" fill="url(#shareShadow)"/>
  <!-- Rear wheel -->
  <circle cx="146" cy="76" r="12" fill="#2a2a3a"/>
  <circle cx="146" cy="76" r="5.5" fill="#888898"/>
  <circle cx="146" cy="76" r="2" fill="#2a2a3a"/>
  <!-- Front wheel -->
  <circle cx="57" cy="76" r="12" fill="#2a2a3a"/>
  <circle cx="57" cy="76" r="5.5" fill="#888898"/>
  <circle cx="57" cy="76" r="2" fill="#2a2a3a"/>
  <!-- Compact body (slightly narrower, shorter roofline) -->
  <rect x="26" y="55" width="150" height="23" rx="9" fill="url(#shareBody)"/>
  <!-- Cabin (shorter roofline than economy) -->
  <path d="M 66,55 L 80,27 L 132,27 L 146,55 Z" fill="#2d2d44"/>
  <!-- Roof highlight streak -->
  <path d="M 84,28 L 130,28 L 130,30 L 84,30 Z" fill="rgba(255,255,255,0.10)"/>
  <!-- Front window -->
  <path d="M 72,54 L 85,29 L 110,29 L 110,54 Z" fill="rgba(190,210,240,0.55)"/>
  <!-- Rear window -->
  <path d="M 113,54 L 113,29 L 130,29 L 143,54 Z" fill="rgba(190,210,240,0.50)"/>
  <!-- Window reflections -->
  <path d="M 75,50 L 82,35 L 86,35 L 79,50 Z" fill="rgba(255,255,255,0.16)"/>
  <!-- Door line -->
  <line x1="110" y1="55" x2="110" y2="78" stroke="rgba(80,80,100,0.15)" stroke-width="1.5"/>
  <!-- Headlight -->
  <ellipse cx="30" cy="63" rx="3.5" ry="2.5" fill="rgba(255,248,200,0.90)"/>
  <ellipse cx="30" cy="63" rx="1.8" ry="1.2" fill="rgba(255,255,220,1)"/>
  <!-- Taillight -->
  <rect x="172" y="61" width="4" height="7" rx="1.5" fill="rgba(200,50,50,0.80)"/>
</svg>
