  <circle cx="104" cy="76" r="12" fill="#1a1a2e"/>
  <circle cx="104" cy="76" r="8.5" fill="#2d2d3d"/>
  <circle cx="104" cy="76" r="5.5" fill="url(#wheel-rim)"/>
