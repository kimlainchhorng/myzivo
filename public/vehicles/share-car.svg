  <!-- Body details -->
  <path d="M26 62 L120 62" stroke="#adb5bd" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="64" y="57" width="13" height="3" rx="1.5" fill="#c9d1d9" stroke="#888" stroke-width="0.5"/>
  <rect x="96" y="57" width="13" height="3" rx="1.5" fill="#c9d1d9" stroke="#888" stroke-width="0.5"/>
