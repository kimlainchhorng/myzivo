  <line x1="104" y1="70.5" x2="104" y2="81.5" stroke="#b0b0b0" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="98.5" y1="76" x2="109.5" y2="76" stroke="#b0b0b0" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="100.1" y1="72.1" x2="107.9" y2="79.9" stroke="#b0b0b0" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="107.9" y1="72.1" x2="100.1" y2="79.9" stroke="#b0b0b0" stroke-width="1" stroke-opacity="0.4"/>
</svg>
