<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" fill="none">
  <defs>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="60%" stop-color="#c9d1d9"/>
      <stop offset="100%" stop-color="#adb5bd"/>
    </linearGradient>
    <linearGradient id="body-side-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d7de"/>
      <stop offset="100%" stop-color="#9ba3ab"/>
    </linearGradient>
    <linearGradient id="front-white" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d0d7de"/>
      <stop offset="100%" stop-color="#9ba3ab"/>
    </linearGradient>
    <linearGradient id="roof-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3038"/>
      <stop offset="100%" stop-color="#1a1d24"/>
    </linearGradient>
    <linearGradient id="glass-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ab0d8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2a7099" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="wheel-rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow — slightly smaller for compact -->
  <ellipse cx="80" cy="84" rx="55" ry="5" fill="url(#shadow)"/>

  <!-- === COMPACT BODY — slightly shorter === -->
  <!-- Side panel -->
  <path d="M24 55 L24 73 Q24 76 27 76 L118 76 Q121 76 121 73 L121 55 Z" fill="url(#body-side-white)"/>
  <!-- Top surface -->
  <path d="M24 55 L40 46 L130 46 L121 55 Z" fill="url(#body-white)"/>
  <!-- Front face -->
  <path d="M121 46 L130 46 L130 73 Q130 76 127 76 L121 76 L121 46 Z" fill="url(#front-white)"/>

  <!-- === CABIN === -->
  <path d="M40 55 L50 31 L108 31 L118 55 Z" fill="url(#body-side-white)"/>
  <path d="M50 31 L54 26 L114 26 L116 31 L108 31 Z" fill="url(#roof-dark)"/>
  <path d="M108 31 L114 26 L122 40 L121 46 L118 55 Z" fill="#1a1d24"/>

