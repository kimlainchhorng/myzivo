<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ECEEF8"/>
      <stop offset="100%" stop-color="#C8CAD8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>
  <!-- Drop shadow -->
  <ellipse cx="140" cy="108" rx="65" ry="6" fill="rgba(0,0,0,0.15)" filter="url(#shadow)"/>
  <!-- Rear wheel -->
  <circle cx="88" cy="97" r="11" fill="#1a1a1a"/>
  <circle cx="88" cy="97" r="4" fill="#888"/>
  <!-- Front wheel -->
  <circle cx="195" cy="97" r="11" fill="#1a1a1a"/>
  <circle cx="195" cy="97" r="4" fill="#888"/>
  <!-- Body: compact sedan -->
  <path d="M62,96 Q62,85 72,85 L77,85 Q82,65 90,61 L118,47 Q134,39 157,39 Q175,39 192,44 L213,56 Q220,62 224,69 L228,85 L235,85 Q244,85 244,96 Z" fill="url(#bodyGrad)"/>
  <!-- Roof -->
  <path d="M118,47 Q134,39 157,39 Q175,39 192,44 L208,55 Q198,48 178,44 Q155,40 133,42 Q118,44 118,47 Z" fill="#2A2C40"/>
  <!-- Window rear -->
  <path d="M122,50 L135,44 L154,43 L154,56 L122,58 Z" fill="rgba(190,215,235,0.45)"/>
  <!-- Window front -->
  <path d="M156,43 L178,44 L190,50 L188,58 L156,56 Z" fill="rgba(190,215,235,0.45)"/>
  <!-- Door line -->
  <line x1="156" y1="56" x2="156" y2="85" stroke="rgba(0,0,0,0.12)" stroke-width="1.2"/>
  <!-- Taillight -->
  <rect x="70" y="70" width="5" height="9" rx="2" fill="#CC3333" opacity="0.85"/>
  <!-- Headlight -->
  <rect x="224" y="66" width="6" height="7" rx="2" fill="#FFFFCC" opacity="0.85"/>
</svg>