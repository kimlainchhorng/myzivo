<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <defs>
    <linearGradient id="xlBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9BADD3"/>
      <stop offset="100%" stop-color="#6B7DA3"/>
    </linearGradient>
    <radialGradient id="xlShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.32)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <!-- Drop shadow (wider for SUV) -->
  <ellipse cx="100" cy="91" rx="85" ry="8" fill="url(#xlShadow)"/>
  <!-- Rear wheel (larger, higher ride height) -->
  <circle cx="152" cy="74" r="15" fill="#222230"/>
  <circle cx="152" cy="74" r="7" fill="#7a7a8c"/>
  <circle cx="152" cy="74" r="3" fill="#222230"/>
  <!-- Front wheel -->
  <circle cx="50" cy="74" r="15" fill="#222230"/>
  <circle cx="50" cy="74" r="7" fill="#7a7a8c"/>
  <circle cx="50" cy="74" r="3" fill="#222230"/>
  <!-- SUV lower body (taller, wider) -->
  <rect x="17" y="47" width="168" height="30" rx="10" fill="url(#xlBody)"/>
  <!-- Side step detail line -->
  <rect x="17" y="70" width="168" height="4" rx="2" fill="rgba(0,0,0,0.13)"/>
  <!-- Cabin / roof (wider, flatter angle for SUV) -->
  <path d="M 57,47 L 70,17 L 146,17 L 159,47 Z" fill="#111827"/>
  <!-- Roof highlight streak -->
  <path d="M 75,18 L 144,18 L 144,20 L 75,20 Z" fill="rgba(255,255,255,0.08)"/>
  <!-- Front window (large) -->
  <path d="M 64,46 L 76,19 L 114,19 L 114,46 Z" fill="rgba(170,200,230,0.55)"/>
  <!-- Rear window (large) -->
  <path d="M 118,46 L 118,19 L 141,19 L 155,46 Z" fill="rgba(170,200,230,0.50)"/>
  <!-- Window reflections -->
  <path d="M 67,42 L 74,24 L 78,24 L 71,42 Z" fill="rgba(255,255,255,0.14)"/>
  <!-- B-pillar door line -->
  <line x1="114" y1="47" x2="114" y2="77" stroke="rgba(0,0,0,0.14)" stroke-width="1.5"/>
  <!-- Headlight -->
  <ellipse cx="22" cy="60" rx="4" ry="3" fill="rgba(255,248,200,0.90)"/>
  <ellipse cx="22" cy="60" rx="2" ry="1.5" fill="rgba(255,255,220,1)"/>
  <!-- Taillight -->
  <rect x="177" y="57" width="5" height="10" rx="2" fill="rgba(200,50,50,0.85)"/>
  <!-- Wheel arch trim -->
  <path d="M 35,76 Q 50,61 65,76" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none"/>
  <path d="M 137,76 Q 152,61 167,76" stroke="rgba(0,0,0,0.15)" stroke-width="2" fill="none"/>
</svg>
