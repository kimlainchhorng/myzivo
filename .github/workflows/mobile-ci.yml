name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "src/hooks/usePushNotifications.ts"
      - "src/main.tsx"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "android/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "src/hooks/usePushNotifications.ts"
      - "src/main.tsx"
      - ".github/workflows/mobile-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    name: iOS simulator build
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate iOS push entitlement
        run: |
          ENTITLEMENT=$(plutil -extract aps-environment raw -o - ios/App/App/App.entitlements)
          if [ -z "$ENTITLEMENT" ]; then
            echo "aps-environment entitlement missing"
            exit 1
          fi
          echo "aps-environment=$ENTITLEMENT"

      - name: Build iOS app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

  android-build:
    name: Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug