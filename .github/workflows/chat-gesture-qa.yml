name: Chat + Gesture QA

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/e2e/**"
      - ".github/workflows/chat-gesture-qa.yml"
  push:
    branches: [main]

jobs:
  chat-gesture-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Chat smoke QA
        run: npx playwright test tests/e2e/chat-click-smoke.spec.ts tests/e2e/chat-workflow-smoke.spec.ts
      - name: Gesture and safe-area QA
        run: npx playwright test tests/e2e/post-menu-a11y.spec.ts tests/e2e/swipe-close.spec.ts tests/e2e/safe-area.spec.ts
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-gesture-qa-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
