name: Mobile UX QA

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/qa/**"
      - "tests/e2e/**"
      - ".github/workflows/safe-area-qa.yml"
    paths-ignore:
      - "docs/**"
      - "website/**"
      - "**/*.md"
      - "**/*.log"
      - "booking-*.json"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "website/**"
      - "**/*.md"
      - "**/*.log"
      - "booking-*.json"

permissions:
  contents: read

concurrency:
  group: mobile-ux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-ux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Static safe-area expression check
        run: npm run qa:safe-area
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Playwright safe-area screenshot QA
        run: npm run qa:safe-area:e2e
      - name: Playwright swipe-close gesture QA
        run: npx playwright test tests/e2e/swipe-close.spec.ts
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ux-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

