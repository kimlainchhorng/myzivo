name: E2E

# Playwright end-to-end tests. Runs the chromium project; the visual project
# stays opt-in via workflow_dispatch since baselines drift easily.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      project:
        description: 'Playwright project to run'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - visual

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (${{ github.event.inputs.project || 'chromium' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        env:
          CI: 'true'
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx playwright test --project=${{ github.event.inputs.project || 'chromium' }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
