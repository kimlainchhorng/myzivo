name: Mobile Build (Capacitor)

# Builds Android (APK + AAB) and iOS (unsigned archive) for releases.
# Runs on version tags (v*) and can be triggered manually.
#
# Required repo secrets (signed Android release):
#   ANDROID_KEYSTORE_BASE64       - base64 of release.keystore
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#
# Required repo secrets (signed iOS release):
#   IOS_P12_BASE64                - base64 of distribution .p12
#   IOS_P12_PASSWORD
#   IOS_PROVISIONING_PROFILE_B64  - base64 of .mobileprovision
#   IOS_TEAM_ID
#
# Without secrets, jobs still produce unsigned debug artifacts so the workflow
# is useful before signing is configured.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options: [debug, release]

permissions:
  contents: read

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-bundle:
    name: Build web bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Build web bundle
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 7

  android:
    name: Android
    needs: web-bundle
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - run: npm ci --no-audit --no-fund

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore

      - name: Build Android (release)
        if: github.event_name == 'push' || inputs.release_type == 'release'
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_ZIVO_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_ZIVO_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_ZIVO_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Build Android (debug)
        if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'debug'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android/app/build/outputs/apk/**/*.apk
            android/app/build/outputs/bundle/**/*.aab
          retention-days: 30

  ios:
    name: iOS
    needs: web-bundle
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci --no-audit --no-fund

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install pods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Import signing assets
        if: env.HAS_P12 == 'true'
        env:
          HAS_P12: ${{ secrets.IOS_P12_BASE64 != '' }}
          P12_B64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_B64 }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p actions "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          echo "$P12_B64" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions "$KEYCHAIN"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE_B64" | base64 -d > "$HOME/Library/MobileDevice/Provisioning Profiles/zivo.mobileprovision"

      - name: Build iOS archive
        working-directory: ios/App
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: ${{ runner.temp }}/App.xcarchive
          retention-days: 30
