name: Lighthouse CI

# Runs Lighthouse against the production build on every PR that touches
# the app surface, so we catch perf, a11y, and best-practice regressions
# before they ship. Budgets are advisory (warn-not-fail) until baselines
# stabilize; flip the asserts below to "error" once the numbers are real.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lighthouse.yml'
      - 'lighthouserc.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
