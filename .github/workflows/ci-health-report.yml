name: CI Health Report

# Posts a concise CI health summary to PRs after the CI workflow completes.
# Helps reviewers see pass/fail + timing without opening Actions manually.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: ci-health-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  report:
    name: Comment CI health on PR
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Post/update PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- ci-health-report -->';
            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];

            if (!pr) {
              core.info('No pull request linked to this workflow run.');
              return;
            }

            const parseMs = (iso) => (iso ? new Date(iso).getTime() : 0);
            const durationMs = Math.max(0, parseMs(run.updated_at) - parseMs(run.run_started_at));
            const durationMin = (durationMs / 60000).toFixed(1);
            const statusEmoji = run.conclusion === 'success' ? '✅' : run.conclusion === 'failure' ? '❌' : '⚠️';

            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });

            const jobs = jobsResp.data.jobs || [];
            const failedJobs = jobs.filter(j => j.conclusion && j.conclusion !== 'success' && j.conclusion !== 'skipped');
            const slowJobs = [...jobs]
              .map(j => {
                const ms = Math.max(0, parseMs(j.completed_at) - parseMs(j.started_at));
                return { name: j.name, ms };
              })
              .sort((a, b) => b.ms - a.ms)
              .slice(0, 3);

            const fmtMin = (ms) => `${(ms / 60000).toFixed(1)}m`;
            const failedList = failedJobs.length
              ? failedJobs.map(j => `- ${j.name}: ${j.conclusion}`).join('\n')
              : '- None';
            const slowList = slowJobs.length
              ? slowJobs.map(j => `- ${j.name}: ${fmtMin(j.ms)}`).join('\n')
              : '- None';

            const body = [
              marker,
              `### CI Health Report`,
              '',
              `${statusEmoji} **Conclusion:** ${run.conclusion || 'unknown'}`,
              `- **Run:** [View workflow run](${run.html_url})`,
              `- **Duration:** ${durationMin} minutes`,
              `- **Run attempt:** ${run.run_attempt}`,
              `- **Head SHA:** \`${run.head_sha?.slice(0, 12) || 'unknown'}\``,
              '',
              `**Failed jobs**`,
              failedList,
              '',
              `**Top slow jobs**`,
              slowList,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
