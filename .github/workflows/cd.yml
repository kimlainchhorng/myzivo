name: CD – Deploy

# Preview deploy on every PR.
# Production deploy on merge to main (after CI passes).

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "website/**"
      - "**/*.md"
      - "**/*.log"
      - "booking-*.json"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      dist-artifact: dist-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript type-check
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run type-check

      - name: Supabase migration drift check
        run: npm run supabase:migrations:check
        continue-on-error: true

      - name: Production build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3
          if-no-files-found: error

  # ── Preview deploy (PRs) ─────────────────────────────────────────────────────
  preview:
    name: Netlify preview
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Check Netlify secrets
        id: netlify-secrets
        run: |
          if [ -n "${{ secrets.NETLIFY_AUTH_TOKEN }}" ] && [ -n "${{ secrets.NETLIFY_SITE_ID }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip preview deploy (missing Netlify secrets)
        if: steps.netlify-secrets.outputs.available != 'true'
        run: echo "Skipping Netlify preview deploy because NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID is missing."

      - name: Deploy preview to Netlify
        if: steps.netlify-secrets.outputs.available == 'true'
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Preview: PR #${{ github.event.number }} – ${{ github.event.pull_request.title }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
          alias: pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

