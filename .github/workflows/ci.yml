name: CI

# Lint, type-check, and unit tests on every PR and push to main.
# Keeps the gate fast: < 5 min. E2E lives in e2e.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run lint

  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: TypeScript
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npm run type-check

  unit-tests:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm test

  supabase-migrations:
    name: Supabase migration integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm run supabase:migrations:check
